---
rhbase_firewall_allow_ports:
  - 3000/tcp # Grafana
  - 53/tcp # DNS
  - 53/udp # DNS
  - 9100/tcp # Node Exporter

prometheus_scrape_configs:
  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "localhost:9100"
          - "dns.test.lan:9100"
          - "web.test.lan:9100"
  - job_name: "bind_exporter"
    static_configs:
      - targets:
          - "dns.test.lan:9119"
  - job_name: "mysqld_exporter"
    static_configs:
      - targets:
          - "web.test.lan:9104"
  - job_name: "apache_exporter"
    static_configs:
      - targets:
          - "web.test.lan:9117"

grafana_security:
  admin_user: admin
  admin_password: root

grafana_datasources:
  - name: prometheus
    type: prometheus
    access: proxy
    url: "http://localhost:9090"
    basicAuth: false

grafana_alerting: {}

dns_servers:
  - 172.26.0.20