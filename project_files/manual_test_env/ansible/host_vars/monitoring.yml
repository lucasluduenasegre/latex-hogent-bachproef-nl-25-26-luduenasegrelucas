# ansible/host_vars/monitoring.yml
# Generated by plantuml2ansible - do not edit manually.
---
rhbase_install_packages:
  - bash-completion
  - bind-utils
  - git
  - nano
  - setroubleshoot-server
  - tree
  - vim-enhanced
  - wget
dns_servers:
  - 172.26.0.20
grafana_alerting: {}
grafana_dashboards_dir: /var/lib/grafana/dashboards
grafana_datasources:
  - name: prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    basicAuth: false
grafana_provisioning_synced: true
grafana_security:
  admin_user: admin
  admin_password: root
prometheus_scrape_configs:
  - job_name: apache_exporter
    static_configs:
      - targets:
          - 172.26.0.10:9117
  - job_name: bind_exporter
    static_configs:
      - targets:
          - 172.26.0.20:9119
  - job_name: mysqld_exporter
    static_configs:
      - targets:
          - 172.26.0.10:9104
  - job_name: node_exporter
    static_configs:
      - targets:
          - 172.26.0.10:9100
          - 172.26.0.20:9100
          - 172.26.0.30:9100
rhbase_firewall_allow_ports:
  - 3000/tcp
  - 53/tcp
  - 53/udp
  - 9100/tcp
node_exporter_port: 9100
